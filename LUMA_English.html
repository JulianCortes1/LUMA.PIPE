<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#F4EEE4">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>LUMA English</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4EEE4;--surface:#FDFAF5;--alt:#EDE7D9;
  --purple:#9B72CF;--pl:#D4BBEF;--pp:#F0E8FA;
  --green:#6DB88E;--gl:#B2E0C4;--gp:#E8F7EF;
  --amber:#D4A054;--ap:#FDF1DE;
  --red:#E07070;--rp:#FFEAEA;
  --text:#2C1F14;--mid:#6B5744;--light:#9B8B7A;--border:#DDD4C4;
  --sh:rgba(44,31,20,.09);--nav:68px;--head:60px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
#app{height:100vh;height:100dvh;display:flex;flex-direction:column;max-width:430px;margin:0 auto;overflow:hidden}
.app-header{height:var(--head);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 18px;flex-shrink:0;box-shadow:0 2px 10px var(--sh)}
.logo{font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:var(--purple)}
.logo span{color:var(--green)}
.streak-badge{display:flex;align-items:center;gap:5px;background:var(--pp);border-radius:20px;padding:5px 12px;font-size:13px;font-weight:800;color:var(--purple)}
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(var(--nav)+10px);-webkit-overflow-scrolling:touch}
.tab{display:none;padding:18px 15px;animation:fadeUp .3s ease}
.tab.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.nav{height:var(--nav);background:var(--surface);border-top:1px solid var(--border);display:flex;padding:0 4px;flex-shrink:0;box-shadow:0 -3px 14px var(--sh)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;color:var(--light);padding:8px 2px;border-radius:10px;transition:color .2s}
.nav-btn.active{color:var(--purple)}
.nav-icon{font-size:21px;line-height:1;transition:transform .2s}
.nav-btn.active .nav-icon{transform:translateY(-2px)}
.nav-dot{width:4px;height:4px;border-radius:50%;background:var(--purple);opacity:0;transition:opacity .2s;margin-top:-2px}
.nav-btn.active .nav-dot{opacity:1}
.nav-lbl{font-size:9.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase}
.card{background:var(--surface);border-radius:18px;padding:16px;border:1px solid var(--border);box-shadow:0 2px 8px var(--sh);margin-bottom:13px}
.card-p{background:var(--pp);border-color:var(--pl)}
.card-g{background:var(--gp);border-color:var(--gl)}
.card-a{background:var(--ap);border-color:#E8C87A}
.page-title{font-family:'Fraunces',serif;font-size:24px;font-weight:700;line-height:1.2;margin-bottom:3px}
.section-title{font-family:'Fraunces',serif;font-size:16px;font-weight:700;margin-bottom:12px}
.body-text{font-size:14px;line-height:1.6;color:var(--mid)}
.label{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--light)}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px}
.bp{background:var(--pp);color:var(--purple)}.bg{background:var(--gp);color:#3A9A68}.ba{background:var(--ap);color:#B07830}.bk{background:var(--alt);color:var(--light)}
.prog{height:8px;background:var(--alt);border-radius:10px;overflow:hidden;margin:7px 0}
.prog-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--purple),var(--green));transition:width 1s cubic-bezier(.4,0,.2,1)}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:14px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:13px 8px;text-align:center}
.stat-val{font-family:'Fraunces',serif;font-size:21px;font-weight:700;color:var(--purple)}
.stat-lbl{font-size:9.5px;font-weight:800;color:var(--light);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.daily{background:linear-gradient(135deg,var(--purple),#7352B8);border-radius:20px;padding:20px;color:white;position:relative;overflow:hidden;margin-bottom:14px;cursor:pointer}
.daily::before{content:'';position:absolute;top:-15px;right:-15px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.08)}
.daily-tag{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;opacity:.7;margin-bottom:7px}
.daily-title{font-family:'Fraunces',serif;font-size:19px;font-weight:700;margin-bottom:7px;line-height:1.3}
.daily-meta{font-size:12px;opacity:.75;margin-bottom:14px}
.btn-white{display:inline-flex;align-items:center;background:white;color:var(--purple);border:none;border-radius:25px;padding:8px 16px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:25px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all .2s}
.btn-p{background:var(--purple);color:white;box-shadow:0 4px 12px rgba(155,114,207,.35)}
.btn-g{background:var(--green);color:white}
.btn-full{width:100%}
.btn-out{background:transparent;color:var(--purple);border:2px solid var(--pl)}
.btn-sm{padding:7px 14px;font-size:13px}
.btn:disabled{opacity:.5;pointer-events:none}
.quote{background:var(--alt);border-radius:13px;padding:14px;text-align:center;margin-bottom:13px}
.quote-text{font-family:'Fraunces',serif;font-style:italic;font-size:14px;color:var(--mid);line-height:1.5}
.quote-author{font-size:11px;color:var(--light);margin-top:5px;font-weight:700}
.tip-card{background:var(--surface);border:1px solid var(--border);border-radius:15px;padding:15px;margin-bottom:11px;display:flex;gap:12px;align-items:flex-start}
.tip-ico{font-size:24px;flex-shrink:0;margin-top:2px}
.tip-title{font-size:14px;font-weight:800;color:var(--text);margin-bottom:4px}
.tip-body{font-size:13px;color:var(--mid);line-height:1.5}
.block{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:13px;box-shadow:0 2px 8px var(--sh)}
.block-hdr{display:flex;align-items:center;justify-content:space-between;padding:15px;cursor:pointer;user-select:none}
.b1 .block-hdr{background:var(--pp)}.b2 .block-hdr{background:var(--gp)}.b3 .block-hdr{background:var(--ap)}
.block-title{font-family:'Fraunces',serif;font-size:15px;font-weight:700;color:var(--text)}
.block-sub{font-size:11px;color:var(--mid);margin-top:2px}
.block-right{display:flex;align-items:center;gap:8px}
.chevron{font-size:16px;color:var(--light);transition:transform .3s}
.block.open .chevron{transform:rotate(180deg)}
.lessons-list{display:none;padding:8px}
.block.open .lessons-list{display:block}
.lesson-item{display:flex;align-items:center;gap:11px;padding:11px;border-radius:11px;cursor:pointer;transition:background .2s;margin-bottom:3px}
.lesson-item:hover{background:var(--bg)}
.lesson-ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.ico-v{background:var(--pp)}.ico-l{background:var(--gp)}.ico-g{background:var(--ap)}.ico-e{background:#E8EEFF}.ico-m{background:#FFF0F5}
.lesson-body{flex:1;min-width:0}
.lesson-title{font-size:13.5px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lesson-meta{font-size:11px;color:var(--light);margin-top:2px;display:flex;align-items:center;gap:5px}
.l-status{width:21px;height:21px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.l-status.done{background:var(--green);border-color:var(--green);color:white}
.exam-row{background:var(--ap);border:1px solid #E8C87A;border-radius:11px;padding:13px;margin:6px 0;display:flex;align-items:center;gap:11px;cursor:pointer}
.exam-row.done{background:var(--gp);border-color:var(--gl)}
.exam-title{font-family:'Fraunces',serif;font-size:14px;font-weight:700;color:var(--text)}
.exam-sub{font-size:11px;color:var(--mid)}
.overlay{position:fixed;inset:0;background:rgba(44,31,20,.45);z-index:100;display:none;align-items:flex-end;backdrop-filter:blur(3px)}
.overlay.on{display:flex}
.modal{background:var(--bg);border-radius:24px 24px 0 0;width:100%;max-height:93vh;overflow-y:auto;padding:0 0 28px;animation:slideUp .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:38px;height:4px;border-radius:2px;background:var(--border);margin:12px auto 0}
.modal-inner{padding:18px 18px 0}
.act-hdr{background:var(--alt);border-radius:11px;padding:11px 14px;margin-bottom:12px}
.act-hdr-title{font-weight:800;font-size:14px;color:var(--text);margin-bottom:3px}
.act-hdr-sub{font-size:12px;color:var(--mid)}
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:14px;margin-bottom:11px}
.q-text{font-size:14px;font-weight:600;color:var(--text);margin-bottom:11px;line-height:1.5}
.opt{display:flex;align-items:center;gap:9px;width:100%;padding:9px 13px;border:1.5px solid var(--border);border-radius:9px;background:var(--bg);cursor:pointer;font-family:'Nunito',sans-serif;font-size:13.5px;color:var(--text);text-align:left;margin-bottom:7px;transition:all .2s}
.opt:hover:not(:disabled){border-color:var(--pl);background:var(--pp)}
.opt.sel{border-color:var(--purple);background:var(--pp);color:var(--purple)}
.opt.correct{border-color:var(--green);background:var(--gp);color:#2D7D52}
.opt.wrong{border-color:var(--red);background:var(--rp);color:#B04040}
.opt-ltr{width:22px;height:22px;border-radius:50%;background:var(--border);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--mid)}
.sel .opt-ltr{background:var(--purple);color:white}
.correct .opt-ltr{background:var(--green);color:white}
.wrong .opt-ltr{background:var(--red);color:white}
.passage{background:var(--alt);border-left:3px solid var(--purple);border-radius:0 10px 10px 0;padding:13px;margin-bottom:13px;font-size:13.5px;line-height:1.7;color:var(--mid);font-style:italic}
.tf-row{display:flex;align-items:flex-start;gap:9px;padding:10px;border:1.5px solid var(--border);border-radius:10px;margin-bottom:8px;background:var(--bg)}
.tf-row.tf-correct{border-color:var(--green);background:var(--gp)}
.tf-row.tf-wrong{border-color:var(--red);background:var(--rp)}
.tf-s{font-size:13.5px;color:var(--text);flex:1;line-height:1.5}
.tf-btns{display:flex;gap:5px;flex-shrink:0;margin-top:1px}
.tf-btn{padding:4px 10px;border-radius:7px;font-size:12px;font-weight:800;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:'Nunito',sans-serif}
.tf-btn.active-t{border-color:var(--green);background:var(--gp);color:#2D7D52}
.tf-btn.active-f{border-color:var(--red);background:var(--rp);color:#B04040}
.fill-row{margin-bottom:11px}
.fill-sentence{font-size:14px;color:var(--text);line-height:1.6;margin-bottom:6px}
.fill-blank{display:inline-block;min-width:80px;border-bottom:2px solid var(--purple);color:var(--purple);font-weight:700;text-align:center;padding:2px 8px}
.fill-inp{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:'Nunito',sans-serif;font-size:14px;background:var(--bg);color:var(--text);outline:none}
.fill-inp:focus{border-color:var(--purple)}
.fill-inp.fill-ok{border-color:var(--green);background:var(--gp);color:#2D7D52}
.fill-inp.fill-err{border-color:var(--red);background:var(--rp);color:#B04040}
.crit-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg);cursor:pointer;margin-bottom:8px}
.crit-row.checked{border-color:var(--green);background:var(--gp)}
.crit-check{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.crit-row.checked .crit-check{background:var(--green);border-color:var(--green);color:white}
.crit-text{font-size:13.5px;color:var(--text);line-height:1.4}
.ext-link{display:flex;align-items:center;gap:10px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:10px;text-decoration:none;color:var(--text)}
.ext-link-name{font-size:13.5px;font-weight:700;color:var(--purple)}
.ext-link-sub{font-size:11px;color:var(--light)}
.refl-q{font-size:13.5px;font-weight:600;color:var(--text);margin-bottom:6px}
.refl-inp{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:'Nunito',sans-serif;font-size:13.5px;background:var(--bg);color:var(--text);outline:none;resize:vertical;min-height:55px;margin-bottom:12px}
.refl-inp:focus{border-color:var(--purple)}
.score-box{text-align:center;padding:22px 16px}
.score-circle{width:78px;height:78px;border-radius:50%;background:var(--pp);border:3px solid var(--pl);display:flex;align-items:center;justify-content:center;margin:0 auto 11px;font-family:'Fraunces',serif;font-size:24px;font-weight:700;color:var(--purple)}
.score-circle.great{background:var(--gp);border-color:var(--gl);color:#2D8050}
.score-msg{font-family:'Fraunces',serif;font-size:17px;font-weight:700;color:var(--text);margin-bottom:5px}
.score-sub{font-size:13px;color:var(--mid)}
.level-display{text-align:center;padding:22px 14px;background:linear-gradient(135deg,var(--pp),var(--gp));border-radius:18px;margin-bottom:14px}
.level-badge{display:inline-block;background:white;border:2px solid var(--pl);border-radius:40px;padding:7px 22px;font-family:'Fraunces',serif;font-size:26px;font-weight:700;color:var(--purple);margin-bottom:7px}
.track{display:flex;align-items:center;gap:8px;margin:6px 0 12px}
.track-lbl{font-size:10px;font-weight:800;color:var(--light);width:28px;text-align:center}
.track-bar{flex:1;height:9px;background:var(--alt);border-radius:10px;overflow:hidden}
.track-fill{height:100%;border-radius:10px}
.tf-p{background:linear-gradient(90deg,var(--pl),var(--purple))}
.tf-g{background:linear-gradient(90deg,var(--gl),var(--green))}
.tf-a{background:linear-gradient(90deg,#E8C87A,var(--amber))}
.result-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border)}
.result-row:last-child{border-bottom:none}
.result-name{font-size:14px;font-weight:700;color:var(--text)}
.result-date{font-size:11px;color:var(--light);margin-top:2px}
.result-score{font-family:'Fraunces',serif;font-size:19px;font-weight:700}
.s-hi{color:var(--green)}.s-mid{color:var(--amber)}.s-lo{color:var(--red)}
.cert{background:var(--surface);border:2px dashed var(--border);border-radius:20px;padding:22px;text-align:center;margin-bottom:14px}
.cert.open{border-style:solid;border-color:var(--gl);background:var(--gp)}
.cert-ico{font-size:44px;margin-bottom:11px;display:block;filter:grayscale(1)}
.cert.open .cert-ico{filter:none}
.cert-title{font-family:'Fraunces',serif;font-size:17px;font-weight:700;color:var(--text);margin-bottom:5px}
.cert-desc{font-size:13px;color:var(--mid);margin-bottom:12px;line-height:1.5}
.cert-date{font-size:12px;font-weight:800;color:var(--green)}
.cert-locked{font-size:12.5px;color:var(--light)}
.conf{position:fixed;pointer-events:none;z-index:200}
.cp{position:absolute;width:9px;height:9px;border-radius:2px;animation:fall linear forwards}
@keyframes fall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
hr{height:1px;background:var(--border);border:none;margin:12px 0}
.flex{display:flex;align-items:center}.between{justify-content:space-between}.mt12{margin-top:12px}.mb12{margin-bottom:12px}.center{text-align:center}
::-webkit-scrollbar{width:0}
</style>
</head>
<body>
<div id="app">
  <header class="app-header">
    <div class="logo">LU<span>MA</span> <span style="font-size:13px;font-weight:600;color:var(--light);font-family:'Nunito',sans-serif">English</span></div>
    <div class="streak-badge" id="streakEl">🔥 0 días</div>
  </header>
  <div class="content">
    <div id="tab-inicio" class="tab active"></div>
    <div id="tab-curso" class="tab"></div>
    <div id="tab-tips" class="tab"></div>
    <div id="tab-progreso" class="tab"></div>
    <div id="tab-logros" class="tab"></div>
  </div>
  <nav class="nav">
    <button class="nav-btn active" onclick="switchTab('inicio')" id="nb-inicio"><div class="nav-icon">🏠</div><div class="nav-dot"></div><div class="nav-lbl">Inicio</div></button>
    <button class="nav-btn" onclick="switchTab('curso')" id="nb-curso"><div class="nav-icon">📚</div><div class="nav-dot"></div><div class="nav-lbl">Curso</div></button>
    <button class="nav-btn" onclick="switchTab('tips')" id="nb-tips"><div class="nav-icon">💡</div><div class="nav-dot"></div><div class="nav-lbl">Tips</div></button>
    <button class="nav-btn" onclick="switchTab('progreso')" id="nb-progreso"><div class="nav-icon">📊</div><div class="nav-dot"></div><div class="nav-lbl">Progreso</div></button>
    <button class="nav-btn" onclick="switchTab('logros')" id="nb-logros"><div class="nav-icon">🏅</div><div class="nav-dot"></div><div class="nav-lbl">Logros</div></button>
  </nav>
</div>
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal"><div class="modal-handle"></div><div class="modal-inner" id="modalInner"></div></div>
</div>
<div class="conf" id="conf"></div>

<script>
// ─── COURSE DATA ─────────────────────────────────────────
var COURSE = [
  {id:1,title:"The Kitchen Speaks",months:"Meses 1-2",cls:"b1",
   lessons:[
    {id:1,title:"Kitchen Vocabulary Basics",type:"vocabulary",icon:"📖",icoCls:"ico-v",
     obj:"Identify and use 30+ kitchen tools and cooking terms in professional contexts.",
     topics:["Kitchen equipment","Food categories","Culinary verbs"],
     acts:[
      {type:"quiz",title:"Kitchen Tools Quiz",qs:[
        {q:"Which tool is used to strain pasta?",opts:["Spatula","Colander","Whisk","Ladle"],c:1},
        {q:"What is a 'cleaver' primarily used for?",opts:["Stirring sauces","Slicing bread","Chopping large cuts of meat","Peeling vegetables"],c:2},
        {q:"Which technique means 'cook slowly in liquid'?",opts:["Sear","Broil","Braise","Saute"],c:2},
        {q:"A 'mandoline' is used to...",opts:["Measure liquids","Slice very thin","Blend soups","Whip cream"],c:1},
        {q:"'Deglaze' means to...",opts:["Drain pasta","Add liquid to lift browned bits","Season the food","Remove the skin"],c:1}
      ]},
      {type:"match",title:"Culinary Terms Match",pairs:[
        {term:"Mise en place",def:"Everything in its place - prep before service"},
        {term:"Al dente",def:"Pasta cooked firm to the bite"},
        {term:"Julienne",def:"Cut into thin matchstick strips"},
        {term:"Baste",def:"Pour cooking juices over food while it cooks"},
        {term:"Blanch",def:"Briefly boil then immediately cool in ice water"}
      ]}
     ]},
    {id:2,title:"A Day at the Restaurant",type:"listening",icon:"🎧",icoCls:"ico-l",
     obj:"Understand and respond to common kitchen and restaurant dialogues between staff.",
     topics:["Restaurant communication","Service vocabulary","Listening for detail"],
     acts:[
      {type:"tf",title:"Kitchen Dialogue Comprehension",
       passage:"HEAD CHEF: Carlos, table 7 ordered the salmon. Plate it with lemon beurre blanc and asparagus. The VIP at table 3 has a nut allergy — double-check every dish. Maria, how long on the risotto? SOUS CHEF: About four minutes, Chef. Should I hold the pasta for table 5? HEAD CHEF: Yes, hold it until the appetizers are cleared. We are also low on heavy cream.",
       qs:[
        {s:"The VIP at table 3 has a gluten allergy.",a:false},
        {s:"The salmon should be plated with asparagus.",a:true},
        {s:"The risotto will be ready in about 4 minutes.",a:true},
        {s:"The pasta for table 5 should go out right away.",a:false},
        {s:"The kitchen is running low on heavy cream.",a:true}
       ]},
      {type:"fill",title:"Complete the Kitchen Phrases",items:[
        {sent:"Please ___ the onions until they turn golden brown.",blank:"saute"},
        {sent:"Always ___ for allergens before sending a dish out.",blank:"check"},
        {sent:"Could you please ___ that order until I give the signal?",blank:"hold"},
        {sent:"The head chef gave the order to ___ the main courses.",blank:"fire"}
      ]}
     ]},

    {id:13,title:"Customer Service Excellence",type:"listening",icon:"🤝",icoCls:"ico-l",

        {s:"The customer was immediately fully satisfied.",a:false}

      {type:"self",title:"Customer Service Role-Play",
       prompt:"Practice OUT LOUD in English: A customer complains their steak is overcooked. You are the server. Handle it professionally — apologize, offer a solution, and make them feel valued. Record yourself if possible.",

// ─── STATE ───────────────────────────────────────────────
var S = {tab:"inicio", progress:{}, streak:0, lastVisit:null};

function loadState() {
  try {
    var d = localStorage.getItem("luma_state");
    if (d) { var p = JSON.parse(d); Object.assign(S, p); }
    updateStreak();
  } catch(e) {}
}

function saveState() {
  try {
    S.lastVisit = new Date().toDateString();
    localStorage.setItem("luma_state", JSON.stringify(S));
  } catch(e) {}
}

function updateStreak() {
  var today = new Date().toDateString();
  var last = S.lastVisit;
  if (!last) { S.streak = 1; }
  else if (last !== today) {
    var diff = (new Date(today) - new Date(last)) / (1000*60*60*24);
    S.streak = (diff === 1) ? (S.streak||0) + 1 : 1;
  }
  document.getElementById("streakEl").textContent = "🔥 " + S.streak + " día" + (S.streak !== 1 ? "s" : "");
  saveState();
}

// ─── NAVIGATION ──────────────────────────────────────────
function switchTab(t) {
  var tabs = document.querySelectorAll(".tab");
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");
  var btns = document.querySelectorAll(".nav-btn");
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove("active");
  document.getElementById("tab-" + t).classList.add("active");
  document.getElementById("nb-" + t).classList.add("active");
  S.tab = t;
  if (t === "inicio") renderInicio();
  else if (t === "curso") renderCurso();
  else if (t === "tips") renderTips();
  else if (t === "progreso") renderProgreso();
  else if (t === "logros") renderLogros();
  document.querySelector(".content").scrollTop = 0;
}

// ─── HELPERS ─────────────────────────────────────────────
function getAllLessons() {
  var out = [];
  for (var i = 0; i < COURSE.length; i++) {
    for (var j = 0; j < COURSE[i].lessons.length; j++) out.push(COURSE[i].lessons[j]);
  }
  return out;
}

function getLessonById(id) {
  var all = getAllLessons();
  for (var i = 0; i < all.length; i++) { if (all[i].id === id) return all[i]; }
  return null;
}

function getExamById(eid) {
  for (var i = 0; i < COURSE.length; i++) { if (COURSE[i].exam.id === eid) return COURSE[i].exam; }
  return null;
}

function getBlockForLesson(id) {
  for (var i = 0; i < COURSE.length; i++) {
    for (var j = 0; j < COURSE[i].lessons.length; j++) {
      if (COURSE[i].lessons[j].id === id) return COURSE[i];
    }
  }
  return null;
}

function totalLessons() { return getAllLessons().length; }

function completedLessons() {
  var count = 0;
  var keys = Object.keys(S.progress);
  for (var i = 0; i < keys.length; i++) {
    if (S.progress[keys[i]].done && !S.progress[keys[i]].isExam) count++;
  }
  return count;
}

function completedExams() {
  var count = 0;
  for (var i = 0; i < COURSE.length; i++) {
    if (S.progress[COURSE[i].exam.id] && S.progress[COURSE[i].exam.id].done) count++;
  }
  return count;
}

function estimatedLevel() {
  var pct = completedLessons() / totalLessons();
  if (pct < 0.15) return {lv:"B1",   desc:"Sólida base — comenzando el recorrido"};
  if (pct < 0.35) return {lv:"B1+",  desc:"Progresando — vocabulario en expansión"};
  if (pct < 0.55) return {lv:"B1/B2",desc:"Transición activa — habilidades creciendo"};
  if (pct < 0.75) return {lv:"B2-",  desc:"Casi nivel B2 — comunicación fluida"};
  return {lv:"B2", desc:"Nivel alcanzado — comunicación profesional"};
}

function avgScore() {
  var scores = [];
  var keys = Object.keys(S.progress);
  for (var i = 0; i < keys.length; i++) {
    var p = S.progress[keys[i]];
    if (p.score != null) scores.push(p.score);
  }
  if (!scores.length) return null;
  var sum = 0; for (var i = 0; i < scores.length; i++) sum += scores[i];
  return Math.round(sum / scores.length);
}

function getNextLesson() {
  for (var i = 0; i < COURSE.length; i++) {
    for (var j = 0; j < COURSE[i].lessons.length; j++) {
      var l = COURSE[i].lessons[j];
      if (!S.progress[l.id] || !S.progress[l.id].done) return l;
    }
  }
  return null;
}

function typeLabel(t) {
  var map = {vocabulary:"Vocabulario",listening:"Listening",grammar:"Gramática",external:"Recurso externo",mixed:"Mixto"};
  return map[t] || t;
}

function typeBadge(t) {
  var map = {vocabulary:"bp",listening:"bg",grammar:"ba",external:"bk",mixed:"bp"};
  return map[t] || "bk";
}

function scoreClass(s) { return s >= 80 ? "s-hi" : s >= 60 ? "s-mid" : "s-lo"; }
function scoreEmoji(s) { return s >= 80 ? "🎉" : s >= 60 ? "👍" : "💪"; }

function confetti() {
  var el = document.getElementById("conf");
  el.innerHTML = "";
  var colors = ["#9B72CF","#6DB88E","#D4A054","#F0E8FA","#B2E0C4"];
  for (var i = 0; i < 30; i++) {
    var p = document.createElement("div");
    p.className = "cp";
    p.style.left = Math.random()*100 + "vw";
    p.style.top = Math.random()*-20 + "px";
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDuration = (1.5 + Math.random()*2) + "s";
    p.style.animationDelay = Math.random()*.8 + "s";
    el.appendChild(p);
  }
  setTimeout(function() { el.innerHTML = ""; }, 4000);
}

    }
    var bPct = Math.round(bDone / b.lessons.length * 100);
    var examDone = S.progress[b.exam.id] && S.progress[b.exam.id].done;

    html += '<div class="chevron">▼</div></div></div>';

    for (var li = 0; li < b.lessons.length; li++) {

      html += '<div class="lesson-meta"><span class="badge ' + lBadge + '">' + typeLabel(l.type) + '</span>' + scoreStr + '</div>';
      html += '</div>';
      html += '<div class="l-status' + statusCls + '">' + statusTxt + '</div>';
      html += '</div>';
    }

    var examRowCls = examDone ? " done" : "";

    var examSubText = examDone ? ("Completado · " + S.progress[b.exam.id].score + "%") : b.exam.desc;

  }

function openLesson(id) {
  var l = getLessonById(id);
  if (!l) return;
  modalState = {type:"lesson", id:id, step:0, scores:[]};
  _quizAnswers = {}; _tfAnswers = {}; _matchAnswers = {};
  showModal();
  renderLessonStep();
}

function openExam(eid) {
  var exam = getExamById(eid);
  if (!exam) return;
  modalState = {type:"exam", id:eid, step:0, examAnswers:{}, examScore:0};
  showModal();
  renderExamStep();
}

function showModal() {
  document.getElementById("overlay").classList.add("on");
  document.body.style.overflow = "hidden";
}

function closeModalFull() {
  document.getElementById("overlay").classList.remove("on");
  document.body.style.overflow = "";
  if (S.tab === "inicio") renderInicio();
  else if (S.tab === "curso") renderCurso();
  else if (S.tab === "progreso") renderProgreso();
  else if (S.tab === "logros") renderLogros();
}

function handleOverlayClick(e) {
  if (e.target.id === "overlay") closeModalFull();
}

  var l = getLessonById(modalState.id);
  if (!l) return;
  var inner = document.getElementById("modalInner");
  var step = modalState.step;
  _quizAnswers = {}; _tfAnswers = {}; _matchAnswers = {};

  if (step === 0) {
    var lp = S.progress[l.id];
    var isDone = lp && lp.done;
    var doneHtml = isDone ? ('<div class="card card-g center mb12"><div style="font-size:20px">✅</div><div style="font-size:13px;font-weight:700;color:var(--green);margin-top:4px">Completada · ' + lp.score + '%</div></div>') : "";
    var topicsHtml = "";
    for (var i = 0; i < l.topics.length; i++) topicsHtml += '<span class="badge bp">' + l.topics[i] + '</span> ';
    var actsHtml = "";
    for (var i = 0; i < l.acts.length; i++) {
      actsHtml += '<div style="display:flex;align-items:center;gap:9px;margin-bottom:8px">';
      actsHtml += '<div style="width:24px;height:24px;border-radius:50%;background:var(--purple);color:white;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0">' + (i+1) + '</div>';
      actsHtml += '<div style="font-size:13.5px;font-weight:600">' + l.acts[i].title + '</div></div>';
    }
    var badgeCls = typeBadge(l.type);
    inner.innerHTML = '<div class="flex between mb12"><div class="badge ' + badgeCls + '">' + typeLabel(l.type) + '</div><button class="btn btn-sm btn-out" onclick="closeModalFull()">✕ Cerrar</button></div>'
      + '<div style="font-size:32px;margin-bottom:8px">' + l.icon + '</div>'
      + '<div class="page-title mb12">' + l.title + '</div>'
      + '<div class="card card-p"><div class="label mb12">🎯 Objetivo</div><div class="body-text">' + l.obj + '</div></div>'
      + '<div class="card"><div class="label mb12">📌 Temas</div><div style="display:flex;flex-wrap:wrap;gap:7px">' + topicsHtml + '</div></div>'
      + '<div class="card card-g"><div class="label mb12">📝 Actividades (' + l.acts.length + ')</div>' + actsHtml + '</div>'
      + doneHtml
      + '<button class="btn btn-p btn-full" onclick="nextLessonStep()" style="margin-bottom:16px">Comenzar →</button>';

  } else if (step >= 1 && step <= l.acts.length) {
    var act = l.acts[step - 1];
    inner.innerHTML = '<div class="flex between mb12"><div class="label">Actividad ' + step + ' de ' + l.acts.length + '</div>'
      + '<button class="btn btn-sm btn-out" onclick="closeModalFull()">✕</button></div>'
      + '<div id="actContent"></div>'
      + '<button class="btn btn-p btn-full" id="actSubmit" onclick="submitActivity()" style="margin-bottom:16px">Verificar →</button>';
    renderActivity(act);

  } else {
    var total = modalState.scores.length;
    var sum = 0;
    for (var i = 0; i < modalState.scores.length; i++) sum += modalState.scores[i];
    var avg = total > 0 ? Math.round(sum / total) : 0;
    var topicsHtml = "";
    for (var i = 0; i < l.topics.length; i++) topicsHtml += '<span class="badge bp">✓ ' + l.topics[i] + '</span> ';
    var circleCls = avg >= 80 ? " great" : "";
    inner.innerHTML = '<div class="score-box">'
      + '<div class="score-circle' + circleCls + '">' + avg + '%</div>'
      + '<div class="score-msg">' + scoreEmoji(avg) + ' ' + (avg>=80?"¡Excelente!":avg>=60?"¡Bien hecho!":"Sigue practicando") + '</div>'
      + '<div class="score-sub">' + l.title + '</div></div>'
      + '<div class="card card-p mb12"><div class="label mb12">✓ Temas completados</div><div style="display:flex;flex-wrap:wrap;gap:7px">' + topicsHtml + '</div></div>'
      + '<button class="btn btn-g btn-full" onclick="completeLesson(' + l.id + ',' + avg + ')" style="margin-bottom:10px">✅ Marcar como completada</button>'
      + '<button class="btn btn-out btn-full" onclick="closeModalFull()" style="margin-bottom:16px">Volver al curso</button>';
    if ((!S.progress[l.id] || !S.progress[l.id].done) && avg >= 60) setTimeout(confetti, 300);
  }
  document.getElementById("modal").scrollTop = 0;
}

function renderActivity(act) {
  var el = document.getElementById("actContent");
  if (!el) return;
  var letters = ["A","B","C","D"];
  var html = "";

  if (act.type === "quiz") {
    html += '<div class="act-hdr"><div class="act-hdr-title">' + act.title + '</div><div class="act-hdr-sub">Selecciona la respuesta correcta.</div></div>';
    for (var qi = 0; qi < act.qs.length; qi++) {
      var q = act.qs[qi];
      html += '<div class="q-card" id="q' + qi + '"><div class="q-text">' + (qi+1) + '. ' + q.q + '</div>';
      for (var oi = 0; oi < q.opts.length; oi++) {
        html += '<button class="opt" onclick="selectOpt(' + qi + ',' + oi + ')" id="opt' + qi + '-' + oi + '"><span class="opt-ltr">' + letters[oi] + '</span>' + q.opts[oi] + '</button>';
      }
      html += '</div>';
    }

  } else if (act.type === "tf") {
    html += '<div class="act-hdr"><div class="act-hdr-title">' + act.title + '</div><div class="act-hdr-sub">Lee el texto y marca Verdadero (V) o Falso (F).</div></div>';
    html += '<div class="passage">' + act.passage + '</div>';
    for (var qi = 0; qi < act.qs.length; qi++) {
      html += '<div class="tf-row" id="tfr' + qi + '"><div class="tf-s">' + (qi+1) + '. ' + act.qs[qi].s + '</div>';
      html += '<div class="tf-btns"><button class="tf-btn" id="tf' + qi + '-t" onclick="selectTF(' + qi + ',true)">V</button>';
      html += '<button class="tf-btn" id="tf' + qi + '-f" onclick="selectTF(' + qi + ',false)">F</button></div></div>';
    }

  } else if (act.type === "match") {
    var shuffled = [];
    for (var i = 0; i < act.pairs.length; i++) shuffled.push({term:act.pairs[i].term,def:act.pairs[i].def,origIdx:i});
    shuffled.sort(function() { return Math.random() - 0.5; });
    _matchShuffled = shuffled;
    html += '<div class="act-hdr"><div class="act-hdr-title">' + act.title + '</div><div class="act-hdr-sub">Para cada término, selecciona la definición correcta.</div></div>';
    for (var pi = 0; pi < act.pairs.length; pi++) {
      html += '<div class="q-card" id="mq' + pi + '"><div class="q-text"><strong>' + act.pairs[pi].term + '</strong></div>';
      for (var si = 0; si < shuffled.length; si++) {
        html += '<button class="opt" onclick="selectMatch(' + pi + ',' + si + ')" id="mo' + pi + '-' + si + '"><span class="opt-ltr">' + letters[si] + '</span>' + shuffled[si].def + '</button>';
      }
      html += '</div>';
    }

  } else if (act.type === "fill") {
    html += '<div class="act-hdr"><div class="act-hdr-title">' + act.title + '</div><div class="act-hdr-sub">Escribe la palabra correcta para completar cada oracion.</div></div>';
    for (var i = 0; i < act.items.length; i++) {
      var sentDisplay = act.items[i].sent.replace("___", '<span class="fill-blank">___</span>');
      html += '<div class="fill-row"><div class="fill-sentence">' + sentDisplay + '</div>';
      html += '<input class="fill-inp" id="fill' + i + '" type="text" placeholder="Tu respuesta..."></div>';
    }

  } else if (act.type === "external") {
    html += '<div class="act-hdr"><div class="act-hdr-title">' + act.title + '</div><div class="act-hdr-sub">Accede al recurso y responde las preguntas de reflexion.</div></div>';
    html += '<a href="' + act.url + '" target="_blank" class="ext-link"><span style="font-size:22px">🔗</span><div><div class="ext-link-name">' + act.urlLabel + '</div><div class="ext-link-sub">Enlace principal</div></div></a>';
    if (act.alt) {
      html += '<a href="' + act.alt + '" target="_blank" class="ext-link"><span style="font-size:22px">🔗</span><div><div class="ext-link-name">' + act.altLabel + '</div><div class="ext-link-sub">Alternativa</div></div></a>';
    }
    html += '<div class="body-text mb12">' + act.desc + '</div>';
    for (var i = 0; i < act.qs.length; i++) {
      var q = typeof act.qs[i] === "string" ? act.qs[i] : act.qs[i].q;
      html += '<div style="margin-bottom:10px"><div class="refl-q">' + (i+1) + '. ' + q + '</div>';
      html += '<textarea class="refl-inp" id="extq' + i + '" placeholder="Tu respuesta en ingles..."></textarea></div>';
    }

  } else if (act.type === "self") {
    html += '<div class="act-hdr"><div class="act-hdr-title">' + act.title + '</div><div class="act-hdr-sub">Autoevaluacion — se honesto contigo mismo.</div></div>';
    html += '<div class="card card-p mb12"><div class="label mb12">🎯 Tu tarea</div><div class="body-text">' + act.prompt + '</div></div>';
    html += '<div class="label mb12">✅ Marca cada criterio que hayas cumplido:</div>';
    for (var i = 0; i < act.criteria.length; i++) {
      html += '<div class="crit-row" id="cr' + i + '" onclick="toggleCrit(' + i + ')">';
      html += '<div class="crit-check" id="cch' + i + '"></div>';
      html += '<div class="crit-text">' + act.criteria[i] + '</div></div>';
    }
  }

  el.innerHTML = html;
}

function selectOpt(qi, oi) {
  var q = document.getElementById("q" + qi);
  if (!q || q.dataset.locked) return;
  var opts = q.querySelectorAll(".opt");
  for (var i = 0; i < opts.length; i++) opts[i].classList.remove("sel");
  var btn = document.getElementById("opt" + qi + "-" + oi);
  if (btn) btn.classList.add("sel");
  _quizAnswers[qi] = oi;
}

function selectTF(i, val) {
  _tfAnswers[i] = val;
  var bt = document.getElementById("tf" + i + "-t");
  var bf = document.getElementById("tf" + i + "-f");
  if (bt) bt.className = "tf-btn" + (val ? " active-t" : "");
  if (bf) bf.className = "tf-btn" + (!val ? " active-f" : "");
}

function selectMatch(qi, si) {
  _matchAnswers[qi] = si;
  var q = document.getElementById("mq" + qi);
  if (!q) return;
  var opts = q.querySelectorAll(".opt");
  for (var i = 0; i < opts.length; i++) opts[i].classList.remove("sel");
  var btn = document.getElementById("mo" + qi + "-" + si);
  if (btn) btn.classList.add("sel");
}

function toggleCrit(i) {
  var row = document.getElementById("cr" + i);
  var check = document.getElementById("cch" + i);
  if (!row || !check) return;
  row.classList.toggle("checked");
  check.textContent = row.classList.contains("checked") ? "✓" : "";
}

function submitActivity() {
  var l = getLessonById(modalState.id);
  if (!l) return;
  var act = l.acts[modalState.step - 1];
  var score = 0;
  var btn = document.getElementById("actSubmit");

  if (act.type === "quiz") {
    var correct = 0;
    for (var qi = 0; qi < act.qs.length; qi++) {
      var q = act.qs[qi];
      var chosen = _quizAnswers[qi];
      var qel = document.getElementById("q" + qi);
      if (qel) qel.dataset.locked = "1";
      if (chosen !== undefined) {
        for (var oi = 0; oi < q.opts.length; oi++) {
          var ob = document.getElementById("opt" + qi + "-" + oi);
          if (ob) {
            ob.disabled = true;
            ob.classList.remove("sel");
            if (oi === q.c) ob.classList.add("correct");
            else if (oi === chosen) ob.classList.add("wrong");
          }
        }
        if (chosen === q.c) correct++;
      }
    }
    score = Math.round(correct / act.qs.length * 100);

  } else if (act.type === "tf") {
    var correct = 0;
    for (var qi = 0; qi < act.qs.length; qi++) {
      var chosen = _tfAnswers[qi];
      var row = document.getElementById("tfr" + qi);
      var bt = document.getElementById("tf" + qi + "-t");
      var bf = document.getElementById("tf" + qi + "-f");
      if (bt) bt.disabled = true;
      if (bf) bf.disabled = true;
      if (chosen !== undefined) {
        if (chosen === act.qs[qi].a) { correct++; if (row) row.classList.add("tf-correct"); }
        else { if (row) row.classList.add("tf-wrong"); }
      }
    }
    score = Math.round(correct / act.qs.length * 100);

  } else if (act.type === "match") {
    var correct = 0;
    for (var pi = 0; pi < act.pairs.length; pi++) {
      var si = _matchAnswers[pi];
      if (si === undefined) continue;
      var isOk = (_matchShuffled[si].origIdx === pi);
      var q = document.getElementById("mq" + pi);
      if (q) { var opts = q.querySelectorAll(".opt"); for (var x = 0; x < opts.length; x++) opts[x].disabled = true; }
      var selBtn = document.getElementById("mo" + pi + "-" + si);
      if (isOk) { correct++; if (selBtn) selBtn.classList.add("correct"); }
      else { if (selBtn) selBtn.classList.add("wrong"); }
    }
    score = Math.round(correct / act.pairs.length * 100);

  } else if (act.type === "fill") {
    var correct = 0;
    for (var i = 0; i < act.items.length; i++) {
      var inp = document.getElementById("fill" + i);
      if (!inp) continue;
      inp.disabled = true;
      var val = inp.value.trim().toLowerCase();
      var expected = act.items[i].blank.toLowerCase();
      if (val === expected) { correct++; inp.classList.add("fill-ok"); }
      else { inp.classList.add("fill-err"); inp.value = 'Correcto: "' + act.items[i].blank + '"'; }
    }
    score = Math.round(correct / act.items.length * 100);

  } else if (act.type === "external") {
    score = 100;

  } else if (act.type === "self") {
    var checked = document.querySelectorAll(".crit-row.checked").length;
    score = Math.round(checked / act.criteria.length * 100);
  }

  modalState.scores.push(score);
  if (btn) {
    btn.textContent = "✓ Siguiente (" + score + "%)";
    btn.onclick = nextLessonStep;
  }
}

function nextLessonStep() {
  var l = getLessonById(modalState.id);
  if (!l) return;
  modalState.step++;
  _quizAnswers = {}; _tfAnswers = {}; _matchAnswers = {};
  renderLessonStep();
}

function completeLesson(id, score) {
  S.progress[id] = {done:true, score:score, date:new Date().toLocaleDateString("es-CO")};
  saveState();
  closeModalFull();
}

      + '<div class="page-title mb12">' + exam.title + '</div>'
      + '<div class="card card-a mb12"><div class="label mb12">ℹ️ Instrucciones</div><div class="body-text">' + exam.qs.length + ' preguntas de opcion multiple. Selecciona la respuesta mas correcta.</div></div>'
      + doneHtml
      + '<button class="btn btn-p btn-full" onclick="startExam()" style="margin-bottom:16px">Comenzar examen →</button>';

      var q = exam.qs[qi];
      html += '<div class="q-card" id="eq' + qi + '"><div class="q-text">' + (qi+1) + '. ' + q.q + '</div>';
      for (var oi = 0; oi < q.opts.length; oi++) {
        html += '<button class="opt" onclick="selectExamOpt(' + qi + ',' + oi + ')" id="eo' + qi + '-' + oi + '"><span class="opt-ltr">' + letters[oi] + '</span>' + q.opts[oi] + '</button>';
      }
      html += '</div>';
    }
    html += '<button class="btn btn-p btn-full" onclick="submitExam()" style="margin-bottom:16px">Entregar examen →</button>';
    inner.innerHTML = html;

  } else {
    var s = modalState.examScore || 0;
    var circleCls = s >= 80 ? " great" : "";
    var resultHtml = (s >= 60)
      ? '<div class="card card-g center mb12"><div style="font-size:24px;margin-bottom:6px">🏅</div><div style="font-weight:700;color:var(--green);font-size:14px">¡Logro desbloqueado! Ve a la pestana Logros.</div></div>'
      : '<div class="card card-a center mb12"><div class="body-text">Revisa las lecciones del bloque y vuelve cuando estes listo.</div></div>';
    inner.innerHTML = '<div class="score-box">'
      + '<div class="score-circle' + circleCls + '">' + s + '%</div>'
      + '<div class="score-msg">' + scoreEmoji(s) + ' ' + (s>=80?"¡Excelente resultado!":s>=60?"¡Aprobado!":"Sigue practicando") + '</div>'
      + '<div class="score-sub">' + exam.title + '</div></div>'
      + resultHtml
      + '<button class="btn btn-g btn-full" onclick="completeExam(\'' + modalState.id + '\',' + s + ')" style="margin-bottom:10px">✅ Guardar resultado</button>'
      + '<button class="btn btn-out btn-full" onclick="closeModalFull()" style="margin-bottom:16px">Cerrar</button>';
    if (s >= 60) setTimeout(confetti, 300);
  }
  document.getElementById("modal").scrollTop = 0;
}

function startExam() {
  modalState.step = 1;
  modalState.examAnswers = {};
  _quizAnswers = {};
  renderExamStep();
}

function selectExamOpt(qi, oi) {
  var q = document.getElementById("eq" + qi);
  if (!q || q.dataset.locked) return;
  var opts = q.querySelectorAll(".opt");
  for (var i = 0; i < opts.length; i++) opts[i].classList.remove("sel");
  var btn = document.getElementById("eo" + qi + "-" + oi);
  if (btn) btn.classList.add("sel");
  modalState.examAnswers[qi] = oi;
}

function submitExam() {
  var exam = getExamById(modalState.id);
  if (!exam) return;
  var correct = 0;
  for (var qi = 0; qi < exam.qs.length; qi++) {
    var q = exam.qs[qi];
    var chosen = modalState.examAnswers[qi];
    var qel = document.getElementById("eq" + qi);
    if (qel) qel.dataset.locked = "1";
    if (chosen !== undefined) {
      for (var oi = 0; oi < q.opts.length; oi++) {
        var ob = document.getElementById("eo" + qi + "-" + oi);
        if (ob) {
          ob.disabled = true;
          ob.classList.remove("sel");
          if (oi === q.c) ob.classList.add("correct");
          else if (oi === chosen) ob.classList.add("wrong");
        }
      }
      if (chosen === q.c) correct++;
    }
  }
  modalState.examScore = Math.round(correct / exam.qs.length * 100);
  var self = this;
  setTimeout(function() { modalState.step = 2; renderExamStep(); }, 600);
}

function completeExam(eid, score) {
  S.progress[eid] = {done:true, score:score, isExam:true, date:new Date().toLocaleDateString("es-CO")};
  saveState();
  closeModalFull();
}

// ─── PROGRESO ─────────────────────────────────────────────
function renderProgreso() {
  var el = document.getElementById("tab-progreso");
  var lv = estimatedLevel();
  var done = completedLessons();
  var total = totalLessons();
  var avg = avgScore();
  var html = "";
  html += '<div class="page-title mb12">Progreso</div>';
  html += '<div class="level-display"><div class="label mb12">Nivel estimado actual</div>';
  html += '<div class="level-badge">' + lv.lv + '</div>';
  html += '<div style="font-size:13px;color:var(--mid);margin-top:5px">' + lv.desc + '</div></div>';
  html += '<div class="card"><div class="section-title">Estadísticas generales</div>';
  html += '<div class="stats">';
  html += '<div class="stat"><div class="stat-val">' + done + '/' + total + '</div><div class="stat-lbl">Lecciones</div></div>';
  html += '<div class="stat"><div class="stat-val">' + (avg != null ? avg + "%" : "—") + '</div><div class="stat-lbl">Promedio</div></div>';
  html += '<div class="stat"><div class="stat-val">' + completedExams() + '/3</div><div class="stat-lbl">Exámenes</div></div>';
  html += '</div></div>';
  html += '<div class="card"><div class="section-title">Progreso por bloque</div>';
  for (var bi = 0; bi < COURSE.length; bi++) {
    var b = COURSE[bi];
    var bDone = 0;
    for (var li = 0; li < b.lessons.length; li++) {
      if (S.progress[b.lessons[li].id] && S.progress[b.lessons[li].id].done) bDone++;
    }
    var bPct = Math.round(bDone / b.lessons.length * 100);
    var bBadge = b.id === 1 ? "bp" : b.id === 2 ? "bg" : "ba";
    var tfc = b.id === 1 ? "tf-p" : b.id === 2 ? "tf-g" : "tf-a";
    var lvLabel = b.id === 1 ? "B1" : b.id === 2 ? "B1+" : "B2";
    html += '<div style="margin-bottom:4px"><div class="flex between">';
    html += '<div style="font-size:13px;font-weight:700">' + b.title + '</div>';
    html += '<div class="badge ' + bBadge + '">' + bPct + '%</div></div>';
    html += '<div class="track"><div class="track-lbl">' + lvLabel + '</div>';
    html += '<div class="track-bar"><div class="track-fill ' + tfc + '" style="width:' + bPct + '%"></div></div>';
    html += '<div class="track-lbl">' + bDone + '/' + b.lessons.length + '</div></div></div>';
  }
  html += '</div>';
  html += '<div class="card"><div class="section-title">Resultados de exámenes</div>';
  for (var bi = 0; bi < COURSE.length; bi++) {
    var b = COURSE[bi];
    var ep = S.progress[b.exam.id];
    html += '<div class="result-row"><div><div class="result-name">' + b.exam.title + '</div>';
    html += '<div class="result-date">' + (ep && ep.done ? ep.date : "Pendiente") + '</div></div>';
    if (ep && ep.done) html += '<div class="result-score ' + scoreClass(ep.score) + '">' + ep.score + '%</div>';
    else html += '<div class="badge bk">—</div>';
    html += '</div>';
  }
  html += '</div>';
  var lessonsDone = [];
  var all = getAllLessons();
  for (var i = all.length - 1; i >= 0 && lessonsDone.length < 6; i--) {
    if (S.progress[all[i].id] && S.progress[all[i].id].done) lessonsDone.push(all[i]);
  }
  if (lessonsDone.length > 0) {
    html += '<div class="card"><div class="section-title">Últimas lecciones completadas</div>';
    for (var i = 0; i < lessonsDone.length; i++) {
      var ll = lessonsDone[i];
      var lp = S.progress[ll.id];
      html += '<div class="result-row"><div><div class="result-name">' + ll.title + '</div>';
      html += '<div class="result-date">' + (lp.date || "") + ' · ' + typeLabel(ll.type) + '</div></div>';
      html += '<div class="result-score ' + scoreClass(lp.score) + '">' + lp.score + '%</div></div>';
    }
    html += '</div>';
  }
  html += '<div class="card card-p center"><div style="font-size:28px;margin-bottom:8px">🎯</div>';
  html += '<div class="section-title" style="margin-bottom:4px">Meta: nivel B2</div>';
  html += '<div class="body-text">Al completar el curso y los 3 exámenes tendrás herramientas sólidas de nivel B2 — especialmente en listening y vocabulario profesional de cocina.</div></div>';
  el.innerHTML = html;
}

// ─── LOGROS ───────────────────────────────────────────────
function renderLogros() {
  var el = document.getElementById("tab-logros");
  var certs = [
    {id:"exam1",icon:"🥉",title:"The Kitchen Speaks — Completado",desc:"Completaste el Bloque 1: vocabulario de cocina, listening basico, grammar y service phrases. Base solida construida.",block:"Meses 1-2"},
    {id:"exam2",icon:"🥈",title:"Pro Kitchen English — Completado",desc:"Dominaste el Bloque 2: brigade system, voz pasiva, manejo de clientes e idioms profesionales.",block:"Meses 3-4"},
    {id:"exam3",icon:"🏆",title:"LUMA Graduate",desc:"¡Completaste LUMA English! Has alcanzado nivel B2 con enfoque en listening y cocina profesional. ¡Increible trabajo, Andres!",block:"Meses 5-6"}
  ];
  var html = '<div class="page-title mb12">Logros 🏅</div>';
  html += '<div class="body-text mb12">Completa cada bloque y su examen para desbloquear los certificados de progreso.</div>';
  for (var i = 0; i < certs.length; i++) {
    var c = certs[i];
    var earned = S.progress[c.id] && S.progress[c.id].done;
    var score = earned ? S.progress[c.id].score : null;
    var date = earned ? S.progress[c.id].date : null;
    html += '<div class="cert' + (earned ? " open" : "") + '">';
    html += '<span class="cert-ico">' + c.icon + '</span>';
    html += '<div class="cert-title">' + c.title + '</div>';
    html += '<div class="cert-desc">' + c.desc + '</div>';
    if (earned) html += '<div class="cert-date">✅ Completado el ' + date + ' · ' + score + '%</div>';
    else html += '<div class="cert-locked">🔒 Completa el bloque (' + c.block + ') y su examen para desbloquear</div>';
    html += '</div>';
  }
  html += '<div class="card card-g center"><div style="font-size:32px;margin-bottom:8px">🌟</div>';
  html += '<div class="section-title" style="margin-bottom:4px">Tu racha actual</div>';
  html += '<div style="font-family:\'Fraunces\',serif;font-size:32px;font-weight:700;color:var(--purple);margin-bottom:4px">' + S.streak + ' día' + (S.streak !== 1 ? 's' : '') + '</div>';
  html += '<div class="body-text">La constancia es la clave del aprendizaje. ¡Sigue así!</div></div>';
  el.innerHTML = html;
}
